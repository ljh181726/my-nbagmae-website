name: Sync to Hugging Face Space

on:
  push:
    branches: [main]
  # Allow manual trigger from GitHub Actions tab
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          lfs: true

      - name: Push to Hugging Face
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          git remote add hf https://alexanderlin:$HF_TOKEN@huggingface.co/spaces/alexanderlin/my-nbagmae-website
          git push --force hf main
